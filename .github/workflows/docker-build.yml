name: Docker Build

on:
  push:
    branches: [ develop, master ]
  pull_request:
    branches: [ develop, master ]

jobs:
  docker-build:
    name: Docker Build (dry-run)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WebAPI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/API/ArtGallery.WebAPI/Dockerfile
          push: false
          tags: artgallery.webapi:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ClientApp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/UI/ArtGallery.ClientApp/Dockerfile
          push: false
          tags: artgallery.clientapp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
